<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PADRONAPP - Padrón ANR 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #ffffff; color: #000; }
        .container { width: 100%; max-width: 800px; text-align: center; }
        
        .logo { width: 150px; margin-bottom: 20px; }
        .divider { width: 100%; height: 2px; background-color: #eee; margin: 10px 0 20px 0; }
        .red-banner { background-color: #d10000; color: white; padding: 18px; font-size: 22px; font-weight: bold; margin-bottom: 10px; border-radius: 4px; text-align: center; }
        
        .grid-row-2 { display: flex; gap: 20px; margin-bottom: 15px; }
        .grid-row-3 { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; text-align: center; }
        
        .result-item { flex: 1; text-align: left; }
        .result-label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .result-value { font-size: 16px; font-weight: 500; color: #000; }
        
        .grid-col { flex: 1; padding: 10px 5px; background-color: #f8f9fa; border-radius: 4px; }
        .grid-label { font-size: 10px; font-weight: bold; color: #666; text-transform: uppercase; }
        .grid-value { font-size: 14px; font-weight: 500; color: #d10000; margin-top: 5px; }

        .result-full { width: 100%; border-bottom: 1px solid #eee; padding: 12px 0; margin-bottom: 10px; }

        .form-group { text-align: left; margin-bottom: 15px; width: 100%; }
        label { font-weight: bold; font-size: 14px; margin-bottom: 8px; display: block; }
        input#cedula { width: 100%; padding: 12px; border: 1px solid #c0d0e0; background-color: #f0f7ff; border-radius: 4px; box-sizing: border-box; font-size: 18px; }
        
        .btn-row { display: flex; justify-content: space-between; margin-top: 25px; gap: 15px; flex-wrap: wrap; }
        .btn-orange { background-color: #ff8c33; color: white; border: none; padding: 14px; border-radius: 30px; font-size: 20px; cursor: pointer; flex: 1; min-width: 120px; text-align: center; text-decoration: none; }
        
        #loading-overlay { display: none; color: #d10000; font-weight: bold; margin: 15px 0; font-size: 18px; }
.candidate-info { margin: 25px 0; font-size: 16px; color: #000; font-weight: 500; line-height: 1.6; }
        .footer-text { margin-top: 30px; font-size: 11px; color: #555; }
    </style>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="PadronApp">
    <link rel="apple-touch-icon" href="padronapp1.png">
</head>

<body>
    <div class="container">
        <img src="padronapp1.png" alt="logo" class="logo">
        <div class="red-banner">Padron ANR 2026 - Fernando de la Mora</div>
        <div class="divider"></div>
        
        <div class="form-group">
            <label for="cedula">Cédula de Identidad:</label>
            <input type="text" id="cedula" placeholder="0">
        </div>

        <div id="loading-overlay">Cargando base de datos...</div>

        <div id="result-container" style="width: 100%; text-align: left;">
            <!-- Custom rendered results -->
        </div>

        <div class="candidate-info">
            -------<br>
            ¡Gracias por tu consulta y tu confianza!<br>
            CANDIDATO/A<br>
            Intendente o Concejal 2026<br>
            Lista: ___ Opción: ___ <br>
            --------
        </div>
        <div class="btn-row">
            <button class="btn-orange" id="aceptar">Aceptar</button>
            <button class="btn-orange" id="limpiar">Limpiar</button>
        </div>

        <div class="footer-text">
            -------<br>
            Padron Actualizado de Afiliados a la ANR para las Internas del 07-Junio-2026.<br>
            -------
        </div>
    </div>

    <script>
        window.csvData = [];
        let currentRecord = null;
        let isLoaded = false;

        const loader = document.getElementById('loading-overlay');
        loader.style.display = 'block';
        
        Papa.parse('padronapp.csv', {
            download: true,
            header: true,
            delimiter: ";",
            encoding: "ISO-8859-1",
            skipEmptyLines: true,
            complete: function(results) {
                window.csvData = results.data;
                isLoaded = true;
                loader.style.display = 'none';
                console.log('CSV Loaded');
            },
            error: function(err) {
                loader.textContent = 'Error al cargar datos.';
            }
        });

        function renderResult(record) {
            const container = document.getElementById('result-container');
            container.innerHTML = '';
            if (!record) return;
            
            container.innerHTML = `
                <div class="result-full">
                    <div class="result-label">NOMBRE COMPLETO</div>
                    <div class="result-value">${record.nombre} ${record.apellido}</div>
                </div>
                <div class="result-full">
                    <div class="result-label">LOCAL DE VOTACIÓN</div>
                    <div class="result-value">${record.local_votacion}</div>
                </div>
                <div class="grid-row-2">
                    <div class="result-item">
                        <div class="result-label">MESA</div>
                        <div class="result-value">${record.mesa}</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">ORDEN</div>
                        <div class="result-value">${record.orden}</div>
                    </div>
                </div>
                <div class="result-full">
                    <div class="result-label">DIRECCIÓN</div>
                    <div class="result-value">${record.direccion}</div>
                </div>
                <div class="grid-row-3">
                    <div class="grid-col">
                        <div class="grid-label">NACIMIENTO</div>
                        <div class="grid-value">${record.fecha_nacimiento}</div>
                    </div>
                    <div class="grid-col">
                        <div class="grid-label">AFILIACIÓN</div>
                        <div class="grid-value">${record.fecha_afiliacion}</div>
                    </div>
                    <div class="grid-col">
                        <div class="grid-label">EDAD</div>
                        <div class="grid-value">${record.edad}</div>
                    </div>
                </div>
            `;
        }

        document.getElementById('aceptar').addEventListener('click', () => {
            if (!isLoaded) {
                alert('La base de datos aún se está cargando.');
                return;
            }
            const val = document.getElementById('cedula').value.trim();
            if (!val) {
                alert('Por favor, ingrese un número de cédula.');
                return;
            }
            currentRecord = window.csvData.find(r => r.cedula === val);
            if (currentRecord) {
                renderResult(currentRecord);
            } else {
                alert('El número de cédula no se encuentra en el padrón.');
                renderResult(null);
            }
        });

        document.getElementById('limpiar').addEventListener('click', () => {
            document.getElementById('cedula').value = '';
            document.getElementById('result-container').innerHTML = '';
            currentRecord = null;
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('Service Worker registrado', reg))
                    .catch((err) => console.error('Error al registrar Service Worker', err));
            });
        }
    </script>
</body>
</html>
