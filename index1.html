<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PADRONAPP - Padrón ANR 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #ffffff; color: #000; }
        .container { width: 100%; max-width: 800px; text-align: center; }
        
        .logo { width: 200px; margin-bottom: 10px; }
        .header-title { font-size: 32px; font-weight: bold; margin: 0; text-transform: uppercase; }
        .header-subtitle { font-size: 24px; font-weight: bold; margin: 5px 0; }
        .divider { width: 100%; height: 5px; background-color: black; margin: 15px 0; }
        
        .red-banner { background-color: #d10000; color: white; padding: 18px; font-size: 26px; font-weight: bold; margin-bottom: 25px; border-radius: 4px; text-align: center; }
        
        .form-group { text-align: left; margin-bottom: 15px; width: 100%; }
        label { font-weight: bold; font-size: 14px; margin-bottom: 8px; display: block; }
        input#cedula { width: 100%; padding: 12px; border: 1px solid #c0d0e0; background-color: #f0f7ff; border-radius: 4px; box-sizing: border-box; font-size: 18px; }
        
        .result-table { width: 100%; border-collapse: collapse; margin-top: 15px; border: 1px solid #e0e0e0; text-align: left; background-color: #fcfcfc; }
        .result-table td { padding: 10px 15px; border-bottom: 1px solid #e0e0e0; font-size: 14px; }
        .result-table td:first-child { font-weight: bold; color: #666; width: 30%; text-transform: uppercase; border-right: 1px solid #e0e0e0; }
        .result-table td:last-child { color: #000; font-weight: 500; }

        .btn-row { display: flex; justify-content: space-between; margin-top: 25px; gap: 15px; flex-wrap: wrap; }
        .btn-orange { background-color: #ff8c33; color: white; border: none; padding: 14px; border-radius: 30px; font-size: 20px; cursor: pointer; flex: 1; min-width: 120px; text-align: center; text-decoration: none; }
        .btn-gray { background-color: #888; color: white; border: none; padding: 10px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; width: 150px; margin: 10px auto; text-transform: uppercase; }

        #loading-overlay { display: none; color: #d10000; font-weight: bold; margin: 15px 0; font-size: 18px; }

        /* Password Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background-color: white; padding: 25px; border-radius: 12px; text-align: center; width: 300px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .modal-content h3 { margin-top: 0; font-size: 18px; }
        .modal-content input { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; text-align: center; font-size: 16px; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .btn-modal-ok { background-color: #d10000; color: white; }
        .btn-modal-cancel { background-color: #666; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <img src="padronapp.png" alt="logo" class="logo">
        <h1 class="header-title">PADRONAPP</h1>
        <h2 class="header-subtitle">APP DE CONSULTAS AL PADRON ANR 2026</h2>
        <div class="divider"></div>
        
        <div class="red-banner">Informacion Partidaria - Fernando de la Mora</div>
        
        <div class="form-group">
            <label for="cedula">Cédula de Identidad:</label>
            <input type="text" id="cedula" placeholder="0">
        </div>

        <div id="loading-overlay">Cargando base de datos...</div>

        <table class="result-table" id="data-table">
            <!-- Table rows for search result B-K -->
        </table>

        <div class="btn-row">
            <button class="btn-orange" id="aceptar">Aceptar</button>
            <button class="btn-orange" id="limpiar">Limpiar</button>
            <button class="btn-orange" id="salir">Salir</button>
        </div>
        
        <button class="btn-gray" id="sigece-btn">SIGECE</button>
    </div>

    <!-- Password Modal -->
    <div id="pw-modal" class="modal">
        <div class="modal-content">
            <h3>Contraseña</h3>
            <input type="password" id="pw-input" placeholder="Ingrese contraseña">
            <div class="modal-btns">
                <button class="btn-modal-ok" id="pw-ok">Aceptar</button>
                <button class="btn-modal-cancel" id="pw-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        window.csvData = [];
        let currentRecord = null;
        let isLoaded = false;

        // Load CSV
        const loader = document.getElementById('loading-overlay');
        loader.style.display = 'block';
        
        Papa.parse('padronapp.csv', {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                window.csvData = results.data;
                isLoaded = true;
                loader.style.display = 'none';
                console.log('CSV Loaded');
            },
            error: function(err) {
                loader.textContent = 'Error al cargar datos. Asegúrese de que el archivo padronapp.csv existe.';
            }
        });

        const tableBody = document.getElementById('data-table');

        function renderResult(record) {
            tableBody.innerHTML = '';
            if (!record) return;
            
            const keys = Object.keys(record);
            // From Column B (index 1) onwards
            for (let i = 1; i < keys.length; i++) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${keys[i]}:</td><td>${record[keys[i]] || ''}</td>`;
                tableBody.appendChild(tr);
            }
        }

        document.getElementById('aceptar').addEventListener('click', () => {
            if (!isLoaded) {
                alert('La base de datos aún se está cargando.');
                return;
            }
            const val = document.getElementById('cedula').value.trim();
            if (!val) {
                alert('Por favor, ingrese un número de cédula.');
                return;
            }
            currentRecord = window.csvData.find(r => r.cedula === val);
            if (currentRecord) {
                renderResult(currentRecord);
            } else {
                alert('El número de cédula no se encuentra en el padrón.');
                renderResult(null);
            }
        });

        document.getElementById('limpiar').addEventListener('click', () => {
            document.getElementById('cedula').value = '';
            tableBody.innerHTML = '';
            currentRecord = null;
        });

        document.getElementById('salir').addEventListener('click', () => {
            if (confirm('¿Está seguro de que desea salir del sistema?')) {
                window.close();
                setTimeout(() => alert('Si la pestaña no se cerró automáticamente, por favor ciérrela manualmente.'), 500);
            }
        });

        // Password Modal Logic
        const pwModal = document.getElementById('pw-modal');
        const pwInput = document.getElementById('pw-input');

        document.getElementById('sigece-btn').addEventListener('click', () => {
            pwModal.style.display = 'flex';
            pwInput.value = '';
            pwInput.focus();
        });

        document.getElementById('pw-cancel').addEventListener('click', () => {
            pwModal.style.display = 'none';
        });

        document.getElementById('pw-ok').addEventListener('click', () => {
            const pass = pwInput.value.trim().toUpperCase();
            if (pass === 'PADRONAPP') {
                window.location.href = 'index1.html';
            } else {
                alert('Contraseña incorrecta.');
                pwInput.value = '';
                pwInput.focus();
            }
        });

        // Allow Enter key in password field
        pwInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('pw-ok').click();
            }
        });
    </script>
</body>
</html>
